env:
  NODE_OPTIONS: "--max-old-space-size=4096"

steps:
  - label: ":information_source: Version Info"
    key: "version"
    command: |
      if [[ "${BUILDKITE_TAG}" =~ ^v ]]; then
        VERSION="${BUILDKITE_TAG}"
        IS_TAG="true"
      else
        PKG_VERSION=$(node -p "require('./package.json').version")
        SHORT_SHA=$(git rev-parse --short HEAD)
        VERSION="v${PKG_VERSION}-beta.${SHORT_SHA}"
        IS_TAG="false"
      fi

      if echo "${VERSION}" | grep -qE "beta|alpha|rc"; then
        IS_BETA="true"
      else
        IS_BETA="false"
      fi

      buildkite-agent meta-data set "release-version" "${VERSION}"
      buildkite-agent meta-data set "is-tag" "${IS_TAG}"
      buildkite-agent meta-data set "is-beta" "${IS_BETA}"

      echo "Version: ${VERSION}  Is tag: ${IS_TAG}  Is beta: ${IS_BETA}"

  - wait

  - label: ":linux: Build Linux"
    key: "build-linux"
    plugins:
      - docker#v5.12.0:
          image: "electronuserland/builder:20"
          workdir: "/build"
          environment:
            - GH_TOKEN
            - ELECTRON_CACHE=/build/.cache/electron
            - ELECTRON_BUILDER_CACHE=/build/.cache/electron-builder
          propagate-uid-gid: false
          mount-buildkite-agent: true
    command: |
      echo "--- Installing dependencies"
      if command -v bun &>/dev/null; then bun install; else npm install --prefer-offline --no-audit --no-fund; fi

      echo "--- Building Linux"
      npx electron-builder build --linux --x64 --config.asar=true

      echo "--- Uploading artifacts"
      buildkite-agent artifact upload "dist/*.AppImage"
      buildkite-agent artifact upload "dist/*.deb"
      buildkite-agent artifact upload "dist/*.rpm"
      buildkite-agent artifact upload "dist/*.snap"
      buildkite-agent artifact upload "dist/*.yml"
      buildkite-agent artifact upload "dist/latest*.yml"
    env:
      GH_TOKEN: "${GITHUB_TOKEN}"

  - label: ":windows: Build Windows"
    key: "build-windows"
    plugins:
      - docker#v5.12.0:
          image: "electronuserland/builder:wine"
          workdir: "/build"
          environment:
            - GH_TOKEN
            - ELECTRON_CACHE=/build/.cache/electron
            - ELECTRON_BUILDER_CACHE=/build/.cache/electron-builder
          propagate-uid-gid: false
          mount-buildkite-agent: true
    command: |
      echo "--- Installing dependencies"
      if command -v bun &>/dev/null; then bun install; else npm install --prefer-offline --no-audit --no-fund; fi

      echo "--- Building Windows"
      npx electron-builder build --win --x64 --config.asar=true

      echo "--- Uploading artifacts"
      buildkite-agent artifact upload "dist/*.exe"
      buildkite-agent artifact upload "dist/*.yml"
      buildkite-agent artifact upload "dist/latest*.yml"
    env:
      GH_TOKEN: "${GITHUB_TOKEN}"

  - label: ":mac: Build macOS"
    key: "build-macos"
    plugins:
      - docker#v5.12.0:
          image: "YOUR_MACOS_DOCKER_IMAGE"
          workdir: "/build"
          environment:
            - GH_TOKEN
          propagate-uid-gid: false
          mount-buildkite-agent: true
    command: |
      echo "--- Installing dependencies"
      if command -v bun &>/dev/null; then bun install; else npm install --prefer-offline --no-audit --no-fund; fi

      echo "--- Building macOS"
      npx electron-builder build --mac --x64 --config.asar=true

      echo "--- Uploading artifacts"
      buildkite-agent artifact upload "dist/*.dmg"
      buildkite-agent artifact upload "dist/*.yml"
      buildkite-agent artifact upload "dist/latest*.yml"
    env:
      GH_TOKEN: "${GITHUB_TOKEN}"

  - wait: ~
    continue_on_failure: false

  - label: ":rocket: Release"
    key: "release"
    command: |
      if [[ "${BUILDKITE_PULL_REQUEST}" != "false" ]]; then
        echo "PR build — skipping release"; exit 0
      fi
      if [[ "${BUILDKITE_BRANCH}" != "master" ]] && [[ "${BUILDKITE_TAG}" == "" ]]; then
        echo "Non-master, non-tag — skipping release"; exit 0
      fi

      VERSION="$(buildkite-agent meta-data get release-version)"
      IS_TAG="$(buildkite-agent meta-data get is-tag)"
      IS_BETA="$(buildkite-agent meta-data get is-beta)"

      echo "--- Downloading all artifacts"
      for step in build-linux build-windows build-macos; do
        buildkite-agent artifact download "dist/*" . --step "${step}" 2>&1 || true
      done

      echo "--- Collecting release assets"
      mkdir -p release-assets
      find . \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" \
                -o -name "*.deb" -o -name "*.rpm" -o -name "*.snap" \
                -o -name "latest*.yml" -o -name "latest*.yaml" \) \
        -exec cp {} release-assets/ \; 2>/dev/null
      ls -lh release-assets/

      if ! command -v gh &>/dev/null; then
        curl -sL "https://github.com/cli/cli/releases/latest/download/gh_$(uname -s)_$(uname -m).tar.gz" | \
          tar xz --strip-components=2 -C /usr/local/bin '*/gh' 2>/dev/null || true
      fi

      if [[ "${IS_TAG}" == "true" ]]; then
        echo "--- Creating GitHub Release ${VERSION}"
        gh release create "${VERSION}" \
          --title "AlrightLauncher ${VERSION}" \
          --notes "$(git log -20 --oneline)" \
          --prerelease="${IS_BETA}" \
          --draft=false \
          release-assets/*
      else
        echo "--- Creating Nightly Release"
        SHORT_SHA=$(git rev-parse --short HEAD)
        NIGHTLY_TAG="nightly-${SHORT_SHA}"
        git tag -f "${NIGHTLY_TAG}"
        git push origin "${NIGHTLY_TAG}" 2>&1 || true

        gh release create "${NIGHTLY_TAG}" \
          --title "AlrightLauncher ${NIGHTLY_TAG} (${VERSION})" \
          --notes "Nightly build from ${BUILDKITE_BRANCH}@${BUILDKITE_COMMIT}" \
          --prerelease=true \
          --draft=false \
          release-assets/* 2>&1 || \
        echo "Release creation skipped"
      fi
    env:
      GH_TOKEN: "${GITHUB_TOKEN}"
